name: Roll back production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Immutable image tag (sha- followed by the 40-character commit SHA)
        required: true
        type: string

permissions:
  contents: read
  packages: read

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy selected immutable image
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          SSH_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
          SSH_PORT: ${{ secrets.PRODUCTION_SSH_PORT }}
          SSH_USER: ${{ secrets.PRODUCTION_SSH_USER }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          case "$IMAGE_TAG" in sha-[0-9a-f][0-9a-f]*) ;; *) exit 2 ;; esac
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts
          printf '%s' "$GHCR_TOKEN" | ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "deploy-with-token student $IMAGE_TAG $GHCR_USER"
